<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>The Train</title>
	<script type="text/javascript" src="./jq.js"></script>
	<script type="text/javascript" src="./mystery.js"></script>
	<script type="text/javascript">
		$(function(){

			const GRID = 20;

			let $track = $('<track>').appendTo('body');
			let $train = $('<train>').appendTo($track);

			let n=0;

			let $writeup = $('<writeup>').appendTo('body');
			$('<h1>').appendTo($writeup).text(MYSTERY.title);
			$('<p>').appendTo($writeup).text(MYSTERY.setting);

			for(var c in MYSTERY.carriages){
				let carriage = MYSTERY.carriages[c];
				
				let $carriage = $('<carriage>').appendTo($train).css({
					width: carriage.grid_size.width * GRID + "px",
					height: carriage.grid_size.height * GRID + "px",
				})

				$('<name>').appendTo($carriage).html(carriage.name);

				for(var c in carriage.characters){
					let $c = $('<character>').appendTo($carriage).css({
						left: carriage.characters[c].x * GRID + 'px',
						top: carriage.characters[c].y * GRID + 'px',
					}).attr('n',n++);

					let $info = $('<info>').appendTo($c).html(
						'<b>'+carriage.characters[c].name+'</b>'
						+'<hr>'
						+carriage.characters[c].free_information
						+'<hr>'
						+'Needs: '
						+carriage.characters[c].needs
						+'<hr>'
						+'Reveal: '
						+carriage.characters[c].reveals_after_requirement
						);
				}

				for(var o in carriage.objects){
					let $o = $('<obj>').appendTo($carriage).css({
						left: carriage.objects[o].x * GRID + 'px',
						top: carriage.objects[o].y * GRID + 'px',
					})

					let $info = $('<info>').appendTo($o).html(
						'<b>'+carriage.objects[o].name+'</b>'
						+'<hr>'
						+carriage.objects[o].description
						+'<hr>'
						+'Relevance: '
						+carriage.objects[o].relevance
						);
				}

				/*for(var y=0; y<carriage.grid.length; y++){
					for(var x=0; x<carriage.grid[y].length; x++){
						let $grid = $('<grid>').appendTo($carriage).attr('KEY',carriage.grid[y][x]).attr('y',y).attr('x',x);
					}
				}



				for(var o in carriage.objects){
					let obj = carriage.objects[o];
					let $grid = $carriage.find(`[y=${obj.position[1]}][x=${obj.position[0]}]`);

					let $obj = $('<obj>').appendTo($grid).attr('type',obj.type);

					if(obj.type=='character') $obj.attr('n',n++);

		
					let $info = $('<info>').appendTo($obj).html(obj.name+'<hr>'+obj.description);
					if(obj.quote){
						
						$('<blockquote>').appendTo($info).text(obj.quote);

					}
				}*/
			}
		})
	</script>
	<style>
		@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap');

		train{
			display: block;
		}

		body{
			padding: 0px;
			margin: 0px;
			background: #3A6F4C;
			background-size: cover;
			overflow-x: scroll;
			overflow-y: hidden;
			font-family: sans-serif;
			font-size: 15px;
			font-family: "EB Garamond", serif;
		}

		train{
			display: block;

			margin-top: 50vh;
			margin-left: 300px;
			white-space: nowrap;
			transform: translateY(-50%);
		}

		carriage{
			display: inline-block;
			width: 500px;
			height: 500px;
			
			vertical-align: middle;
			margin: 2px;
			
			box-shadow: inset 0px 10px 20px rgba(0,0,0,0.3), 0px 100px 10px rgba(0,0,0,0.3);
			white-space: normal;
			line-height: 0px;
			position: relative;

			background: gray;
			border-radius: 10px;
			border: 3px solid #999;
		}


		carriage name{
			display: block;
			position: absolute;
			
			left: 0px;
			right: 0px;
			top: -20px;
			color: #ddd;

			
			font-size: 15px;
			
			
			
			
			white-space: normal;
			
			
		}

		grid{
			display: inline-block;
			width: 20px;
			height: 20px;
			box-sizing: border-box;
			background: #333;
		}

		grid[KEY='.']{
			background: #555;
		}

		grid[KEY='W']{
			background: #777;
		}

		
		character, obj{
			display: block;
			position: absolute;
			cursor: pointer;
		}

		obj:after{
			content: "?";
			display: block;
			width: 20px;
			height: 20px;
			left: -10px;
			top: -10px;
			border-radius: 50%;
			background: rgba(0, 0, 0, 0.1);
			position: absolute;
			text-align: center;
			color: orange;
			font-weight: bold;
			line-height: 20px;
		}

		character:after{
			content: "";
			display: block;
			width: 40px;
			height: 40px;
			left: -20px;
			top: -20px;
			border-radius: 50%;
			background: red;
			position: absolute;
			background-color: transparent;
			background-image: url(./humans.png);
			background-size: 500%;
		}

		obj[type='corpse']{
			background-color: transparent;
			background-image: url(./corpse.png);
			background-size: 100%;
			width: 200%;
			height: 300%;
			left: -50%;
			top: -100%;
		}

		character[n='0']:after{ background-position-x: 0%; }
		character[n='1']:after{ background-position-x: -100%; }
		character[n='2']:after{ background-position-x: -200%; }
		character[n='3']:after{ background-position-x: -300%; }
		character[n='4']:after{ background-position-x: -400%; }
		character[n='5']:after{ background-position-y: -100%; }
		character[n='6']:after{ background-position-y: -100%; background-position-x: -100%; }
		character[n='7']:after{ background-position-y: -100%; background-position-x: -200%; }

		info{
			display: block;
			position: absolute;
			bottom: 50px;
			left: 0px;
			background: white;

			line-height: 1.2em;
			padding: 10px;
			margin: 10px;
			transform: translateX(-50%);
			
			box-sizing: border-box;
			white-space: normal;
			border-radius: 5px;
			width: 300px;
			z-index: 1;
			pointer-events: none;
			visibility: hidden;
		}

		character:hover info, obj:hover info{
			
			visibility: visible;
		}

		blockquote:before{
			content: '"';

		}

		blockquote{
			font-style: italic;
			color: #777;
			font-weight: bold;
		}

		track{
			display: block;
			position: absolute;
			inset: 0px;
			background: url(./track.webp);
			background-position: center left;
			background-repeat: repeat-x;
			background-size: 500px;
			animation: scroll;
			animation-duration: 1s;
			animation-iteration-count: infinite;
			animation-timing-function: linear;
			width: 200vw;
		}

		writeup{
			position: absolute;
			top: 20px;
			left: 20px;
			background: white;
			padding: 20px;
			display: block;
			color: black;
			width: 300px;
			background: ;
			box-shadow: 0px 25px 10px rgba(0,0,0,0.2);
			background: #e8d3c0;
		}

		h1{
			margin: 0px;
			padding: 0px;
			line-height: 1em;
		}

		@keyframes scroll {
		  from {
		    background-position-x: 0%;
		  }

		  to {
		    background-position-x: 500px;
		  }
		}
	</style>
</head>
<body>

</body>
</html>
