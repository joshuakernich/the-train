<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>The Train</title>
	<script type="text/javascript" src="./jq.js"></script>
	<script type="text/javascript" src="./mystery.js"></script>
	<script type="text/javascript">
		$(function(){

			const GRID = 20;

			let $track = $('<track>').appendTo('body');
			let $train = $('<train>').appendTo($track);

			let n=0;

			for(var c in MYSTERY.carriages){
				let carriage = MYSTERY.carriages[c];
				
				let $carriage = $('<carriage>').appendTo($train).css({
					width: carriage.size.width * GRID + "px",
					height: carriage.size.height * GRID + "px",
				})

				$('<name>').appendTo($carriage).html(carriage.name+'<hr>');

				for(var y=0; y<carriage.grid.length; y++){
					for(var x=0; x<carriage.grid[y].length; x++){
						let $grid = $('<grid>').appendTo($carriage).attr('KEY',carriage.grid[y][x]).attr('y',y).attr('x',x);
					}
				}



				for(var o in carriage.objects){
					let obj = carriage.objects[o];
					let $grid = $carriage.find(`[y=${obj.position[1]}][x=${obj.position[0]}]`);

					let $obj = $('<obj>').appendTo($grid).attr('type',obj.type);

					if(obj.type=='character') $obj.attr('n',n++);

		
					let $info = $('<info>').appendTo($obj).html(obj.name+'<hr>'+obj.description);
					if(obj.quote){
						
						$('<blockquote>').appendTo($info).text(obj.quote);

					}
				}
			}
		})
	</script>
	<style>
		@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap');

		train{
			display: block;
		}

		body{
			padding: 0px;
			margin: 0px;
			background: #3A6F4C;
			background-size: cover;
			overflow-x: scroll;
			overflow-y: hidden;
			font-family: sans-serif;
			font-size: 15px;
			font-family: "EB Garamond", serif;
		}

		train{
			display: block;

			margin-top: 50vh;
			margin-left: 300px;
			white-space: nowrap;
			transform: translateY(-50%);
		}

		carriage{
			display: inline-block;
			width: 500px;
			height: 500px;
			
			vertical-align: middle;
			margin: 2px;
			
			box-shadow: 0px 100px 10px rgba(0,0,0,0.3);
			white-space: normal;
			line-height: 0px;
			position: relative;
		}

		carriage name{
			display: block;
			position: absolute;
			
			left: 0px;
			top: -20px;
			color: #ddd;

			
			font-size: 20px;
			
			
			
			
			white-space: normal;
			
			text-align: center;
		}

		grid{
			display: inline-block;
			width: 20px;
			height: 20px;
			box-sizing: border-box;
			background: #333;
		}

		grid[KEY='.']{
			background: #555;
		}

		grid[KEY='W']{
			background: #777;
		}

		obj{
			display: block;
			width: 100%;
			height: 100%;
			border-radius: 50%;
			background: red;
			position: relative;
		}

		obj[type='character']{
			background-color: transparent;
			background-image: url(./humans.png);
			background-size: 500%;
			width: 200%;
			height: 200%;
			left: -50%;
			top: -75%;
		}

		obj[type='corpse']{
			background-color: transparent;
			background-image: url(./corpse.png);
			background-size: 100%;
			width: 200%;
			height: 300%;
			left: -50%;
			top: -100%;
		}

		obj[type='character'][n='1']{ background-position-x: -100%; }
		obj[type='character'][n='2']{ background-position-x: -200%; }
		obj[type='character'][n='3']{ background-position-x: -300%; }
		obj[type='character'][n='4']{ background-position-x: -400%; }
		obj[type='character'][n='5']{ background-position-x: -500%; }
		obj[type='character'][n='6']{ background-position-x: -600%; }

		obj info{
			display: none;
			position: absolute;
			bottom: 50px;
			left: 0px;
			background: white;

			line-height: 1.2em;
			padding: 10px;
			margin: 10px;
			transform: translateX(-50%);
			
			box-sizing: border-box;
			z-index: 1;
			white-space: normal;
			border-radius: 5px;
			width: 300px;
		}

		obj:hover info{
			display: block;
		}

		blockquote:before{
			content: '"';

		}

		blockquote{
			font-style: italic;
			color: #777;
			font-weight: bold;
		}

		track{
			display: block;
			position: absolute;
			inset: 0px;
			background: url(./track.webp);
			background-position: center left;
			background-repeat: repeat-x;
			background-size: 500px;
			animation: scroll;
			animation-duration: 1s;
			animation-iteration-count: infinite;
			animation-timing-function: linear;
			width: 200vw;
		}

		@keyframes scroll {
		  from {
		    background-position-x: 0%;
		  }

		  to {
		    background-position-x: 500px;
		  }
		}
	</style>
</head>
<body>

</body>
</html>
